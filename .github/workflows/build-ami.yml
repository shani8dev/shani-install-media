name: Build ShaniOS AMI

on:
  push:
    branches: [main]
    paths:
      - "packer/**"
      - "image_profiles/server/**"
      - "config/config.sh"
  workflow_dispatch:
    inputs:
      profile:
        description: "Image profile"
        required: true
        default: "server"
        type: choice
        options: [server, gnome, plasma, cosmic]
      root_volume_size_gb:
        description: "Root volume GiB (server=20, desktop=40)"
        required: false
        default: "20"
      promote_stable:
        description: "Promote to stable after build"
        required: false
        default: false
        type: boolean

env:
  PACKER_VERSION: "1.11.0"
  SHANIOS_PROFILE: ${{ github.event.inputs.profile || 'server' }}

jobs:
  build-ami:
    name: "Build AMI (${{ github.event.inputs.profile || 'server' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Install Packer ${{ env.PACKER_VERSION }}
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Packer init
        working-directory: packer/templates
        run: packer init .

      - name: Packer validate
        working-directory: packer
        env:
          PKR_VAR_aws_region:      ${{ secrets.AWS_REGION }}
          PKR_VAR_shanios_profile: ${{ env.SHANIOS_PROFILE }}
          PKR_VAR_r2_base_url:     ${{ secrets.R2_BASE_URL }}
          PKR_VAR_gpg_key_id:      ${{ secrets.GPG_KEY_ID }}
        run: packer validate templates/

      - name: Packer build
        id: packer_build
        working-directory: packer
        env:
          PACKER_LOG:      1
          PACKER_LOG_PATH: /tmp/packer-build.log
          PKR_VAR_aws_region:          ${{ secrets.AWS_REGION }}
          PKR_VAR_instance_type:       ${{ vars.PACKER_INSTANCE_TYPE || 'c6a.xlarge' }}
          PKR_VAR_shanios_profile:     ${{ env.SHANIOS_PROFILE }}
          PKR_VAR_r2_base_url:         ${{ secrets.R2_BASE_URL }}
          PKR_VAR_gpg_key_id:          ${{ secrets.GPG_KEY_ID }}
          PKR_VAR_gpg_public_key:      ${{ secrets.GPG_PUBLIC_KEY }}
          PKR_VAR_root_volume_size_gb: ${{ github.event.inputs.root_volume_size_gb || '20' }}
          PKR_VAR_tags: |
            {
              OS        = "ShaniOS"
              ManagedBy = "Packer"
              GitSHA    = "${{ github.sha }}"
              GitRef    = "${{ github.ref_name }}"
              Profile   = "${{ env.SHANIOS_PROFILE }}"
            }
        run: |
          packer build \
            -timestamp-ui \
            -var "shanios_profile=${SHANIOS_PROFILE}" \
            templates/

      - name: Read AMI ID from manifest
        id: ami
        if: success()
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' packer/packer-manifest.json | cut -d: -f2)
          echo "ami_id=${AMI_ID}" >> "$GITHUB_OUTPUT"
          echo "Built AMI: ${AMI_ID}"

      - name: Upload Packer log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packer-build-log-${{ env.SHANIOS_PROFILE }}
          path: /tmp/packer-build.log
          retention-days: 7

      - name: Job summary
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ShaniOS AMI — ${{ env.SHANIOS_PROFILE }}

          | Field    | Value |
          |----------|-------|
          | Profile  | ${{ env.SHANIOS_PROFILE }} |
          | AMI ID   | ${{ steps.ami.outputs.ami_id }} |
          | Region   | ${{ secrets.AWS_REGION }} |
          | Git SHA  | ${{ github.sha }} |
          | Volume   | ${{ github.event.inputs.root_volume_size_gb || '20' }} GiB |
          EOF
