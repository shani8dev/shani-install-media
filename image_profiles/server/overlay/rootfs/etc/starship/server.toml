# /etc/starship/server.toml — ShaniOS server profile starship prompt
# Always shows user@host — critical when SSH'd into many machines.
# No language version segments — keeps prompt fast and relevant for ops.

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$container\
$terraform\
$jobs\
$status\
$line_break\
$character"""

[username]
show_always = true
style_user  = "bold green"
style_root  = "bold red"
format      = "[$user]($style)"

[hostname]
ssh_only = false
format   = "@[$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 4
truncate_to_repo  = false
style             = "bold cyan"
format            = "[$path]($style)[$read_only]($read_only_style) "
read_only         = " 🔒"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style  = "bold purple"

[git_status]
format     = '([\[$all_status$ahead_behind\]]($style) )'
style      = "bold red"
conflicted = "⚠"
ahead      = "⬆${count}"
behind     = "⬇${count}"
diverged   = "⬆${ahead_count}⬇${behind_count}"
modified   = "!${count}"
untracked  = "?${count}"
staged     = "+${count}"
deleted    = "✘${count}"

[container]
format = "[$symbol \\[$name\\]]($style) "
symbol = "⬡"
style  = "bold blue"

[terraform]
format   = "[$symbol$workspace]($style) "
symbol   = "💠 "
style    = "bold 105"
disabled = false

[jobs]
symbol    = "⚙"
threshold = 1
format    = "[$symbol $number]($style) "
style     = "bold blue"

[status]
disabled       = false
format         = "[$symbol $status]($style) "
symbol         = "✗"
success_symbol = ""
style          = "bold red"

[time]
disabled = false
format   = "[$time]($style) "
style    = "bold dimmed white"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

