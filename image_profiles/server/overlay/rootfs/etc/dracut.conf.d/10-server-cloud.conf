# dracut config for ShaniOS server / cloud AMI profile.
# Ensures virtio, ENA (AWS Nitro), NVMe, and overlay/btrfs drivers are in every initrd.

# Drivers essential for AWS Nitro instances
add_drivers+=" virtio virtio_pci virtio_blk virtio_net virtio_scsi "
add_drivers+=" nvme nvme_core ena xen_blkfront xen_netfront "
add_drivers+=" overlay btrfs "

# Bring up network in initrd so cloud-init can reach the metadata service
add_dracutmodules+=" network-manager "

# Use systemd inside the initrd — matches the ShaniOS runtime
dracutmodules+=" systemd systemd-initrd dracut-systemd "

# Generic initrd — do not bake in the build host's hardware
hostonly="no"
hostonly_cmdline="no"

reproducible="yes"
