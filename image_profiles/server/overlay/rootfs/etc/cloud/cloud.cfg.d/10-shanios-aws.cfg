# /etc/cloud/cloud.cfg.d/10-shanios-aws.cfg
# ShaniOS server profile — AWS Ec2 datasource.
# Compared against: AL2023, RHEL9, Ubuntu 24.04 cloud-init defaults.

datasource_list: [Ec2, None]

datasource:
  Ec2:
    timeout: 50
    max_wait: 120
    metadata_urls:
      - http://169.254.169.254
      - http://[fd00:ec2::254]
    apply_full_imds_network_config: true
    # Enforce IMDSv2 — AL2023 default; rejects IMDSv1 token-less requests
    strict_id: true

# Disable root SSH login entirely (cloud-init manages key injection for 'shanios')
# RHEL9 sets this; protects against misconfigured sshd_config
disable_root: true

# Regenerate SSH host keys per-instance so AMI copies don't share keys
# RHEL9 cloud.cfg includes both of these; critical for AMI golden images
ssh_deletekeys: true
ssh_genkeytypes: ['rsa', 'ecdsa', 'ed25519']

preserve_hostname: false
manage_etc_hosts: true

system_info:
  default_user:
    name: shanios
    shell: /bin/zsh
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    groups: [wheel, sys, input, kvm, lxd, libvirt, sambashare]
    lock_passwd: true

cloud_init_modules:
  - migrator
  - seed_random
  - bootcmd
  - write-files
  - growpart
  - resizefs
  - disk_setup
  - mounts
  - set_hostname
  - update_hostname
  - update_etc_hosts
  # Added vs previous: ca_certs (RHEL9 includes this for trust chain updates)
  - ca_certs
  - users-groups
  - ssh

cloud_config_modules:
  - ssh-import-id
  - keyboard
  - locale
  - set-passwords
  - ntp
  - timezone
  - disable-ec2-metadata
  - runcmd

cloud_final_modules:
  - scripts-vendor
  - scripts-per-once
  - scripts-per-boot
  - scripts-per-instance
  - scripts-user
  - ssh-authkey-fingerprints
  - final-message
