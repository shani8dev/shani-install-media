# /etc/sysctl.d/80-server-hardening.conf
# ShaniOS server profile — kernel, filesystem, and network hardening.
# Sources: AL2023, RHEL9, Ubuntu 24.04, Arch security wiki, madaidans-insecurities guide.

# ── Kernel hardening ──────────────────────────────────────────────────────────
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.printk = 3 3 3 3
# Disable kexec — prevents loading a malicious kernel at runtime (RHEL9 default)
kernel.kexec_load_disabled = 1
# Restrict SysRq — disables remote sysrq abuse (AL2023 disables entirely)
kernel.sysrq = 0
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2
kernel.yama.ptrace_scope = 1
kernel.perf_event_paranoid = 3
kernel.randomize_va_space = 2
fs.suid_dumpable = 0

# ── User namespaces: MUST be 1 for rootless podman / distrobox / buildah ─────
# linux-hardened sets this to 0 by default — we set explicitly to survive upgrades
kernel.unprivileged_userns_clone = 1
user.max_user_namespaces = 15000

# ── Filesystem hardening (prevents TOCTOU races — from madaidans guide) ───────
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 1
fs.protected_regular = 2

# ── Network hardening ─────────────────────────────────────────────────────────
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0
net.ipv4.tcp_rfc1337 = 1
# Disable TCP timestamps — prevents uptime fingerprinting (RHEL9 hardening guide)
net.ipv4.tcp_timestamps = 0
net.ipv4.icmp_ignore_bogus_error_responses = 1
# Do not accept router advertisements (server, not a client)
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.accept_ra = 0

# ── Rootless port binding: allows caddy/nginx/podman to bind 80/443 unprivileged
net.ipv4.ip_unprivileged_port_start = 80

# ── VM / memory tuning (AL2023 server defaults) ───────────────────────────────
vm.swappiness = 10
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# ── High-bandwidth socket buffers for EC2 ────────────────────────────────────
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
