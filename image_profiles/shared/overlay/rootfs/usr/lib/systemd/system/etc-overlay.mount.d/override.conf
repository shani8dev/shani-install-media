[Unit]
# Require tmpfiles to have run before attempting the /etc overlay mount.
# If shanios-tmpfiles-data fails (e.g. because data.mount failed), this mount
# fails immediately with a clear error rather than attempting to mount an overlay
# against missing upper/work directories and leaving /etc in an unknown state.
Requires=shanios-tmpfiles-data.service
After=shanios-tmpfiles-data.service

[Mount]
TimeoutSec=10s
