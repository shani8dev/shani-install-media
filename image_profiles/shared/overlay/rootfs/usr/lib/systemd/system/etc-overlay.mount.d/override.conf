[Unit]
# Require tmpfiles AND crypt-restore to have completed before the /etc overlay
# mounts. If either fails, this mount fails immediately with a clear error
# rather than mounting an overlay against missing upper/work dirs or a missing
# /etc/crypttab, leaving /etc in an unknown or insecure state.
#
# Ordering:
#   data.mount
#     → shanios-tmpfiles-data.service   (creates upper + work)
#       → shani-restore-crypt.service   (writes crypttab + dracut conf)
#         → etc-overlay.mount           ← this unit
Requires=shanios-tmpfiles-data.service
After=shanios-tmpfiles-data.service
Requires=shani-restore-crypt.service
After=shani-restore-crypt.service

[Mount]
TimeoutSec=10s
