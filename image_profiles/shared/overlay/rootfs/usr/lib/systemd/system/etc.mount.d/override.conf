[Unit]
# Require tmpfiles to have completed before the /etc overlay mounts.
# If it fails, this mount fails immediately with a clear error rather than
# mounting an overlay against missing upper/work dirs.
#
# Ordering:
#   data.mount
#     → shanios-tmpfiles-data.service   (creates upper + work)
#       → etc-overlay.mount             ← this unit
#
# Note: crypttab and dracut conf are written by gen-efi.sh (ensure_crypttab)
# at UKI build time — no boot-time crypt restore service is needed since
# the UKI cmdline carries all rd.luks.* parameters and the keyfile is
# embedded in the initrd at build time.
Requires=shanios-tmpfiles-data.service
After=shanios-tmpfiles-data.service

[Mount]
TimeoutSec=10s
