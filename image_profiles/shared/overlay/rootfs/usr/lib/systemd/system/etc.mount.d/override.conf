[Unit]
# Require tmpfiles to have completed before the /etc overlay mounts.
# If it fails, this mount fails immediately with a clear error rather than
# mounting an overlay against missing upper/work dirs.
#
# Ordering:
#   data.mount
#     → shanios-tmpfiles-data.service   (creates upper + work)
#       → etc.mount             ← this unit
#
Requires=shanios-tmpfiles-data.service
After=shanios-tmpfiles-data.service

[Mount]
TimeoutSec=10s
