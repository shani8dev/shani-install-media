# /etc/tmpfiles.d/shanios-data-structure.conf
# ShaniOS - Persistent /data directory structure
# Created automatically on every boot
# ============================================================================
# This file defines the directory structure for /data that persists across
# blue/green root switches. Directories are created with systemd-tmpfiles
# early in boot before other services start.
# ============================================================================

##############################################################################
# SECTION 1: CORE DATA & OVERLAY STORAGE
##############################################################################

# Root data volume - backing store for overlays and bind mounts
d /data 0755 root root -

# OverlayFS backing storage - upper and work directories for atomic operations
d /data/overlay 0755 root root -
d /data/overlay/etc 0755 root root -
d /data/overlay/etc/upper 0755 root root -
d /data/overlay/etc/work 0755 root root -
d /data/overlay/var 0755 root root -
d /data/overlay/var/upper 0755 root root -
d /data/overlay/var/work 0755 root root -

# Download & temporary storage for deployment operations
d /data/downloads 0755 root root -

##############################################################################
# SECTION 2: SYSTEM FOUNDATION SERVICES
##############################################################################

# Parent directory for all /var/lib service state directories
d /data/varlib 0755 root root -

# D-Bus: Machine ID and system bus state
d /data/varlib/dbus 0755 root root -

# systemd: System manager state, timers, random seed
d /data/varlib/systemd 0755 root root -

##############################################################################
# SECTION 3: FONT RENDERING
##############################################################################

# fontconfig: Font configuration cache
d /data/varlib/fontconfig 0755 root root -

##############################################################################
# SECTION 4: NETWORKING & CONNECTIVITY
##############################################################################

# NetworkManager: Connection profiles, WiFi passwords, VPN configs
d /data/varlib/NetworkManager 0755 root root -

# Bluetooth: Paired device database
d /data/varlib/bluetooth 0755 root root -

# firewalld: Firewall rules and configuration
d /data/varlib/firewalld 0755 root root -

##############################################################################
# SECTION 5: FILE SHARING & NETWORK SERVICES
##############################################################################

# samba: Samba server configuration and state
d /data/varlib/samba 0755 root root -

# nfs: NFS server exports, client tracking, and lock state
d /data/varlib/nfs 0755 root root -

##############################################################################
# SECTION 6: REMOTE ACCESS & VPN SERVICES
##############################################################################

# caddy: Web server state and configs
d /data/varlib/caddy 0755 root root -

# tailscale: VPN state and keys
d /data/varlib/tailscale 0755 root root -

# cloudflared: Persistent configuration and credentials
d /data/varlib/cloudflared 0755 root root -

# geoclue: Geolocation service state
d /data/varlib/geoclue 0755 root root -

##############################################################################
# SECTION 7: DISPLAY MANAGER & DESKTOP
##############################################################################

# GDM: GNOME Display Manager session state
d /data/varlib/gdm 0755 root root -

# SDDM: Simple Desktop Display Manager state
d /data/varlib/sddm 0755 root root -

# colord: Color management profiles
d /data/varlib/colord 0755 root root -

##############################################################################
# SECTION 8: AUDIO & PERIPHERALS
##############################################################################

# pipewire: Audio session and runtime state
d /data/varlib/pipewire 0755 root root -

# rtkit: Realtime scheduling service state
d /data/varlib/rtkit 0755 root root -

# cups: Printer configurations and queues
d /data/varlib/cups 0755 root root -

# sane: Scanner configurations
d /data/varlib/sane 0755 root root -

# upower: Power management statistics
d /data/varlib/upower 0755 root root -

##############################################################################
# SECTION 9: USER AUTHENTICATION & SECURITY
##############################################################################

# fprint: Fingerprint enrollment data
d /data/varlib/fprint 0755 root root -

# AccountsService: User account metadata, avatars, session preferences
d /data/varlib/AccountsService 0755 root root -

# boltd: Thunderbolt device authorization database
d /data/varlib/boltd 0755 root root -

# sudo: Authentication timestamp cache
d /data/varlib/sudo 0755 root root -

# sshd: OpenSSH runtime state
d /data/varlib/sshd 0755 root root -

# polkit-1: PolicyKit authorization cache
d /data/varlib/polkit-1 0755 root root -

##############################################################################
# SECTION 10: HARDWARE & FIRMWARE
##############################################################################

# fwupd: Firmware update state database
d /data/varlib/fwupd 0755 root root -

# tpm2-tss: TPM2 Software Stack persistent state
d /data/varlib/tpm2-tss 0755 root root -

##############################################################################
# SECTION 11: DATA PROTECTION & PERSISTENCE
##############################################################################

# fail2ban: Persistent jail and log database
d /data/varlib/fail2ban 0755 root root -

# restic: Backup and restore state
d /data/varlib/restic 0755 root root -

# rclone: Cloud sync and mount configuration
d /data/varlib/rclone 0755 root root -

# appimage: AppImage runtime and cache
d /data/varlib/appimage 0755 root root -

##############################################################################
# SECTION 12: JOB SCHEDULING SPOOL DIRECTORIES
##############################################################################

# Parent directory for all /var/spool directories
d /data/varspool 0755 root root -

# anacron: persistent timestamps for daily/weekly/monthly scheduled jobs
d /data/varspool/anacron 0755 root root -

# cronie: System cron scheduler state and user crontabs
d /data/varspool/cron 0755 root root -

# at: Job scheduler spool
d /data/varspool/at 0755 root root -

##############################################################################
# SECTION 13: PRINT QUEUES & MAIL SPOOLS
##############################################################################

# cups (spool): Printer job queue and pending jobs
d /data/varspool/cups 0755 root root -

# samba (spool): SMB file lock state + Samba print spool
d /data/varspool/samba 0755 root root -

# postfix: Mail transfer agent spool
d /data/varspool/postfix 0755 root root -
