# /usr/lib/tmpfiles.d/shanios-snapd-snap-dir.conf
# ShaniOS - Ensure /var/lib/snapd/snap exists inside the @snapd subvolume
# ============================================================================
# snapd creates /var/lib/snapd/snap on its first run. On an immutable system
# the fstab bind mount (snap.mount) fires before snapd.service starts, so the
# source directory may not exist yet, causing snap.mount to fail at boot.
#
# This file is processed by shanios-tmpfiles-snapd.service which runs strictly
# after var-lib-snapd.mount, guaranteeing the 'd' entry lands inside the
# persistent @snapd subvolume rather than on the tmpfs underneath it.
# ============================================================================
# /snap
d /snap 0755 root root -
# /var/lib/snapd/snap — bind-mount source for /snap
d /var/lib/snapd/snap 0755 root root -
